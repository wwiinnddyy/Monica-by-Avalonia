name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example 1.2.3 or v1.2.3
        required: true
        type: string
      build_mode:
        description: Build JIT, AOT, or both
        required: true
        default: both
        type: choice
        options:
          - both
          - jit
          - aot
      include_mobile:
        description: Build mobile packages too, Android APK and iOS IPA
        required: true
        default: false
        type: boolean
      draft:
        description: Create the GitHub release as a draft
        required: true
        default: true
        type: boolean
      prerelease:
        description: Mark this GitHub release as a prerelease
        required: true
        default: false
        type: boolean

permissions:
  contents: write

env:
  DOTNET_VERSION: 10.0.x
  PROJECT_DIR: monica by avalonia
  APP_PROJECT: src/Monica.App/Monica.App.csproj
  ANDROID_PROJECT: src/Monica.Android/Monica.Android.csproj
  IOS_PROJECT: src/Monica.iOS/Monica.iOS.csproj

jobs:
  version:
    name: Resolve release version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_prefix: ${{ steps.version.outputs.version_prefix }}
      package_version: ${{ steps.version.outputs.package_version }}
      assembly_version: ${{ steps.version.outputs.assembly_version }}
      file_version: ${{ steps.version.outputs.file_version }}
      informational_version: ${{ steps.version.outputs.informational_version }}
      tag: ${{ steps.version.outputs.tag }}
      modes_json: ${{ steps.modes.outputs.modes_json }}
      macos_matrix_json: ${{ steps.modes.outputs.macos_matrix_json }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release version
        id: version
        shell: pwsh
        working-directory: ${{ env.PROJECT_DIR }}
        run: ./eng/ci/resolve-version.ps1 -Mode release -ReleaseVersion "${{ inputs.version }}"

      - name: Resolve selected modes
        id: modes
        shell: pwsh
        run: |
          if ('${{ inputs.build_mode }}' -eq 'both') {
            $modes = @('jit', 'aot')
          } else {
            $modes = @('${{ inputs.build_mode }}')
          }

          $macosMatrix = @()
          foreach ($mode in $modes) {
            $macosMatrix += @{ mode = $mode; rid = 'osx-x64'; os = 'macos-15-intel' }
            $macosMatrix += @{ mode = $mode; rid = 'osx-arm64'; os = 'macos-15' }
          }

          $modesJson = ConvertTo-Json $modes -Compress
          $macosMatrixJson = ConvertTo-Json @{ include = $macosMatrix } -Compress
          "modes_json=$modesJson" >> $env:GITHUB_OUTPUT
          "macos_matrix_json=$macosMatrixJson" >> $env:GITHUB_OUTPUT

  windows:
    name: Windows Inno Setup ${{ matrix.mode }}
    needs: version
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        mode: ${{ fromJson(needs.version.outputs.modes_json) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Publish Windows
        id: publish
        shell: pwsh
        working-directory: ${{ env.PROJECT_DIR }}
        run: >
          ./eng/ci/publish-desktop.ps1
          -Project "${{ env.APP_PROJECT }}"
          -RuntimeIdentifier win-x64
          -Mode "${{ matrix.mode }}"
          -Version "${{ needs.version.outputs.version }}"
          -VersionPrefix "${{ needs.version.outputs.version_prefix }}"
          -PackageVersion "${{ needs.version.outputs.package_version }}"
          -AssemblyVersion "${{ needs.version.outputs.assembly_version }}"
          -FileVersion "${{ needs.version.outputs.file_version }}"
          -InformationalVersion "${{ needs.version.outputs.informational_version }}"

      - name: Build installer
        shell: pwsh
        working-directory: ${{ env.PROJECT_DIR }}
        run: >
          ./eng/package/package-windows-inno.ps1
          -PublishDirectory "${{ steps.publish.outputs.publish_dir }}"
          -OutputDirectory artifacts/release/windows
          -Version "${{ needs.version.outputs.version }}"
          -Mode "${{ matrix.mode }}"

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: Monica-${{ needs.version.outputs.version }}-windows-${{ matrix.mode }}-setup
          path: ${{ env.PROJECT_DIR }}/artifacts/release/windows/*.exe
          if-no-files-found: error

  linux:
    name: Linux deb ${{ matrix.rid }} ${{ matrix.mode }}
    needs: version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        rid:
          - linux-x64
        mode: ${{ fromJson(needs.version.outputs.modes_json) }}
        include:
          - rid: linux-x64
            os: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install package tools
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev dpkg-dev fakeroot

      - name: Publish Linux
        id: publish
        shell: pwsh
        working-directory: ${{ env.PROJECT_DIR }}
        run: >
          ./eng/ci/publish-desktop.ps1
          -Project "${{ env.APP_PROJECT }}"
          -RuntimeIdentifier "${{ matrix.rid }}"
          -Mode "${{ matrix.mode }}"
          -Version "${{ needs.version.outputs.version }}"
          -VersionPrefix "${{ needs.version.outputs.version_prefix }}"
          -PackageVersion "${{ needs.version.outputs.package_version }}"
          -AssemblyVersion "${{ needs.version.outputs.assembly_version }}"
          -FileVersion "${{ needs.version.outputs.file_version }}"
          -InformationalVersion "${{ needs.version.outputs.informational_version }}"

      - name: Build deb
        shell: bash
        working-directory: ${{ env.PROJECT_DIR }}
        run: >
          bash ./eng/package/package-linux-deb.sh
          "${{ steps.publish.outputs.publish_dir }}"
          "artifacts/release/linux"
          "${{ needs.version.outputs.version }}"
          "${{ matrix.rid }}"
          "${{ matrix.mode }}"

      - name: Upload deb
        uses: actions/upload-artifact@v4
        with:
          name: Monica-${{ needs.version.outputs.version }}-${{ matrix.rid }}-${{ matrix.mode }}-deb
          path: ${{ env.PROJECT_DIR }}/artifacts/release/linux/*.deb
          if-no-files-found: error

  macos:
    name: macOS DMG ${{ matrix.rid }} ${{ matrix.mode }}
    needs: version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.version.outputs.macos_matrix_json) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish macOS
        id: publish
        shell: pwsh
        working-directory: ${{ env.PROJECT_DIR }}
        run: >
          ./eng/ci/publish-desktop.ps1
          -Project "${{ env.APP_PROJECT }}"
          -RuntimeIdentifier "${{ matrix.rid }}"
          -Mode "${{ matrix.mode }}"
          -Version "${{ needs.version.outputs.version }}"
          -VersionPrefix "${{ needs.version.outputs.version_prefix }}"
          -PackageVersion "${{ needs.version.outputs.package_version }}"
          -AssemblyVersion "${{ needs.version.outputs.assembly_version }}"
          -FileVersion "${{ needs.version.outputs.file_version }}"
          -InformationalVersion "${{ needs.version.outputs.informational_version }}"

      - name: Build dmg
        shell: bash
        working-directory: ${{ env.PROJECT_DIR }}
        run: >
          bash ./eng/package/package-macos-dmg.sh
          "${{ steps.publish.outputs.publish_dir }}"
          "artifacts/release/macos"
          "${{ needs.version.outputs.version }}"
          "${{ matrix.rid }}"
          "${{ matrix.mode }}"

      - name: Upload dmg
        uses: actions/upload-artifact@v4
        with:
          name: Monica-${{ needs.version.outputs.version }}-${{ matrix.rid }}-${{ matrix.mode }}-dmg
          path: ${{ env.PROJECT_DIR }}/artifacts/release/macos/*.dmg
          if-no-files-found: error

  android:
    name: Android APK ${{ matrix.mode }}
    needs: version
    if: ${{ inputs.include_mobile }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mode: ${{ fromJson(needs.version.outputs.modes_json) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install Android workload
        run: dotnet workload install android

      - name: Publish APK
        shell: pwsh
        working-directory: ${{ env.PROJECT_DIR }}
        run: >
          ./eng/ci/publish-android.ps1
          -Project "${{ env.ANDROID_PROJECT }}"
          -Mode "${{ matrix.mode }}"
          -Version "${{ needs.version.outputs.version }}"
          -VersionPrefix "${{ needs.version.outputs.version_prefix }}"
          -PackageVersion "${{ needs.version.outputs.package_version }}"
          -AssemblyVersion "${{ needs.version.outputs.assembly_version }}"
          -FileVersion "${{ needs.version.outputs.file_version }}"
          -InformationalVersion "${{ needs.version.outputs.informational_version }}"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Monica-${{ needs.version.outputs.version }}-android-${{ matrix.mode }}-apk
          path: ${{ env.PROJECT_DIR }}/artifacts/mobile/android/${{ matrix.mode }}/*.apk
          if-no-files-found: error

  ios:
    name: iOS IPA ${{ matrix.mode }}
    needs: version
    if: ${{ inputs.include_mobile }}
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        mode: ${{ fromJson(needs.version.outputs.modes_json) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install iOS workload
        run: dotnet workload install ios

      - name: Publish IPA
        shell: pwsh
        working-directory: ${{ env.PROJECT_DIR }}
        run: >
          ./eng/ci/publish-ios.ps1
          -Project "${{ env.IOS_PROJECT }}"
          -Mode "${{ matrix.mode }}"
          -Version "${{ needs.version.outputs.version }}"
          -VersionPrefix "${{ needs.version.outputs.version_prefix }}"
          -PackageVersion "${{ needs.version.outputs.package_version }}"
          -AssemblyVersion "${{ needs.version.outputs.assembly_version }}"
          -FileVersion "${{ needs.version.outputs.file_version }}"
          -InformationalVersion "${{ needs.version.outputs.informational_version }}"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Monica-${{ needs.version.outputs.version }}-ios-${{ matrix.mode }}-ipa
          path: ${{ env.PROJECT_DIR }}/artifacts/mobile/ios/${{ matrix.mode }}/*.ipa
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs:
      - version
      - windows
      - linux
      - macos
      - android
      - ios
    runs-on: ubuntu-latest
    if: ${{ always() && needs.version.result == 'success' && needs.windows.result == 'success' && needs.linux.result == 'success' && needs.macos.result == 'success' && (inputs.include_mobile == false || (needs.android.result == 'success' && needs.ios.result == 'success')) }}

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: Monica ${{ needs.version.outputs.version }}
          draft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
          files: release-assets/*
